running:
  runs: 15
  cores: all
  plotting: true
  output_file: "test.csv"
simulation:
  random_image_matrix: false
  norm:
  ebsn: [0, 1, 0, 1, 0, 1, 0, 1]  # GGBBBBGG=SJ
  sn: [1, 0, 0, 1]
  z: 40
  mu: 1 # mu/Z
  chi: 0.01
  eps: 0.01
  alpha: 0
  xi: 0
  benefit: 5
  cost: 1
  beta: 1
  observability: 1
  consensus_thresh: 0
  non_consensus_strategy: emotion
  gamma_min: 0
  gamma_max: 1
  gamma_delta: 0 # use 0 for homogeneous population
  gamma_gaussian_n: 1
  generations: 1000
  convergence period: 0
